<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATI - Kia Car Designer Edition</title>
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --accent: #ffffff;
            --text-main: #ffffff;
            --text-sub: #888888;
            --border: #222222;
        }
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { width: 90%; max-width: 600px; padding: 40px 20px; }
        
        /* Progress Bar */
        .progress-container { margin-bottom: 40px; }
        .progress-text { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .progress-bg { height: 2px; background: var(--border); width: 100%; position: relative; }
        .progress-bar { height: 2px; background: var(--accent); width: 0%; transition: width 0.4s ease; }

        /* Card Animation */
        #app { transition: opacity 0.3s ease, transform 0.3s ease; min-height: 400px; }
        .fade-out { opacity: 0; transform: translateY(-10px); }

        h1 { font-size: 26px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.5px; }
        h2 { font-size: 20px; font-weight: 500; line-height: 1.5; margin-bottom: 30px; word-break: keep-all; }
        p { color: var(--text-sub); line-height: 1.7; font-size: 15px; margin-bottom: 30px; white-space: pre-line; }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .score-btn { 
            padding: 18px; border-radius: 4px; border: 1px solid var(--border); 
            background: var(--card); color: var(--text-main); font-size: 16px;
            cursor: pointer; transition: all 0.2s ease; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }
        .score-btn:hover { background: #1a1a1a; border-color: #444; }
        .score-btn span { font-size: 12px; color: var(--text-sub); }

        .action-btn {
            width: 100%; padding: 18px; border-radius: 4px; border: none;
            background: var(--accent); color: #000; font-weight: 700;
            font-size: 16px; cursor: pointer; margin-top: 20px;
        }

        /* Result Styles */
        .result-card { background: var(--card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); margin-top: 20px;}
        .type-code { font-size: 48px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
        .type-title { font-size: 22px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .env-badge { display: inline-block; padding: 6px 14px; background: #222; font-size: 13px; border-radius: 4px; margin-right: 8px; margin-bottom: 8px; }
        .section-title { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; border-left: 2px solid var(--accent); padding-left: 10px; }
        
        .workflow-item { margin-bottom: 20px; padding: 15px; background: #1a1a1a; border-radius: 4px; }
        .workflow-step { font-weight: 700; font-size: 14px; color: var(--accent); display: block; margin-bottom: 8px; }
        .workflow-prompt { font-family: monospace; font-size: 13px; color: #aaa; border-top: 1px solid #333; padding-top: 8px; display: block; margin-top: 8px; }
    </style>
</head>

let currentSecIdx = -1;
let currentQIdx = 0;
let scores = { G:0, S:0, L:0, R:0, F:0, C:0, M:0, U:0, EF:0, PF:0 };

function startSurvey() {
    document.getElementById("progress-box").style.display = "block";
    nextSection();
}

function nextSection() {
    currentSecIdx++;
    currentQIdx = 0;
    if (currentSecIdx >= sections.length) {
        showResult();
        return;
    }
    renderIntro();
}

function renderIntro() {
    const sec = sections[currentSecIdx];
    const app = document.getElementById("app");
    app.innerHTML = `
        <div class="section-title">SECTION ${currentSecIdx + 1}</div>
        <h1>${sec.title}</h1>
        <p>${sec.desc}</p>
        <button class="action-btn" onclick="renderQuestion()">이해했습니다</button>
    `;
}

function renderQuestion() {
    const sec = sections[currentSecIdx];
    const q = sec.questions[currentQIdx];
    const app = document.getElementById("app");
    
    // 전체 진행률 계산
    let completedQs = 0;
    for(let i=0; i<currentSecIdx; i++) completedQs += sections[i].questions.length;
    completedQs += currentQIdx;
    let totalQs = 0;
    sections.forEach(s => totalQs += s.questions.length);
    
    document.getElementById("progress-txt").innerText = `Question ${completedQs + 1} / ${totalQs}`;
    document.getElementById("bar").style.width = `${(completedQs / totalQs) * 100}%`;

    app.innerHTML = `
        <div class="section-title">${sec.title}</div>
        <h2>${q[0]}</h2>
        <div class="btn-group">
            <button class="score-btn" onclick="handleAnswer(5)">매우 그렇다 <span>5</span></button>
            <button class="score-btn" onclick="handleAnswer(4)">그렇다 <span>4</span></button>
            <button class="score-btn" onclick="handleAnswer(3)">보통 <span>3</span></button>
            <button class="score-btn" onclick="handleAnswer(2)">아니다 <span>2</span></button>
            <button class="score-btn" onclick="handleAnswer(1)">전혀 아니다 <span>1</span></button>
        </div>
    `;
}

function handleAnswer(val) {
    const type = sections[currentSecIdx].questions[currentQIdx][1];
    
    if (type === "PF_REV") scores["PF"] += (6 - val);
    else scores[type] += val;

    currentQIdx++;
    if (currentQIdx >= sections[currentSecIdx].questions.length) {
        nextSection();
    } else {
        renderQuestion();
    }
}

function showResult() {
    document.getElementById("progress-box").style.display = "none";
    
    let code = "";
    code += scores.G >= scores.S ? "G" : "S";
    code += scores.L >= scores.R ? "L" : "R";
    code += scores.F >= scores.C ? "F" : "C";
    code += scores.M >= scores.U ? "M" : "U";

    const typeInfo = resultData[code];
    const efAvg = (scores.EF / 3).toFixed(1);
    const pfAvg = (scores.PF / 7).toFixed(1);

    document.getElementById("app").innerHTML = `
        <div class="result-card">
            <div class="type-code">${code}</div>
            <div class="type-title">${typeInfo[0]}</div>
            <p style="color:white;">${typeInfo[1]}</p>
            <div class="section-title">추천 직무</div>
            <p style="font-size:14px;">${typeInfo[2]}</p>
            
            <div class="env-badge">물리적 자유도: ${efAvg} / 5.0</div>
            <div class="env-badge">심리적 자유도: ${pfAvg} / 5.0</div>

            <button class="action-btn" onclick="showAiGuide('${code}')">AI 협업 가이드 보기</button>
        </div>
    `;
}

function showAiGuide(code) {
    const group = code.substring(0, 2); // GL, GR, SL, SR 중 하나
    const guide = aiGuides[group];
    const typeInfo = resultData[code];

    document.getElementById("app").innerHTML = `
        <div class="result-card">
            <div class="section-title">${code}를 위한 AI 가이드</div>
            <h2 style="margin-bottom:10px;">${guide.role}</h2>
            
            <div class="section-title">추천 워크플로우</div>
            ${guide.flow.map(f => `
                <div class="workflow-item">
                    <span class="workflow-step">${f.step}: ${f.content}</span>
                    <span class="workflow-prompt">"프롬프트 예시: ${f.prompt}"</span>
                </div>
            `).join('')}

            <div class="section-title">유형별 강점</div>
            <p style="font-size:14px; color:#aaa;">${typeInfo[1]}</p>

            <button class="action-btn" style="background:#222; color:#fff;" onclick="location.reload()">다시 테스트하기</button>
        </div>
    `;
}
</script>
</body>
</html>
