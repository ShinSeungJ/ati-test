<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATI - Kia Car Designer Edition</title>
    <style>
        :root {
            --bg: #050505; --card: #121212; --accent: #ffffff;
            --text-main: #ffffff; --text-sub: #888888; --border: #222222;
            --input-bg: #1a1a1a;
        }
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        
        /* Top Logo */
        .top-logo { position: fixed; top: 25px; right: 25px; height: 28px; z-index: 1000; }

        .container { width: 95%; max-width: 700px; padding: 60px 10px 40px; position: relative; }
        
        .progress-container { margin-bottom: 40px; }
        .progress-text { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .progress-bg { height: 2px; background: var(--border); width: 100%; position: relative; }
        .progress-bar { height: 2px; background: var(--accent); width: 0%; transition: width 0.3s ease; }

        #app { transition: opacity 0.3s ease; min-height: 450px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.5px; }
        h2 { font-size: 20px; font-weight: 500; line-height: 1.5; margin-bottom: 30px; word-break: keep-all; }
        .desc-text { color: var(--text-sub); line-height: 1.7; font-size: 15px; margin-bottom: 30px; white-space: pre-line; }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 8px; text-transform: uppercase; }
        .form-input, .form-select { 
            width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid var(--border);
            color: white; border-radius: 4px; box-sizing: border-box; font-size: 16px; appearance: none;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .score-btn { 
            padding: 16px; border-radius: 4px; border: 1px solid var(--border); 
            background: var(--card); color: var(--text-main); font-size: 16px;
            cursor: pointer; transition: all 0.2s ease; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }
        .score-btn:hover { background: #1a1a1a; border-color: #444; }
        .score-btn.selected { border-color: var(--accent); background: rgba(255,255,255,0.08); font-weight: bold; }
        .score-btn span { font-size: 12px; color: var(--text-sub); }

        .action-btn {
            width: 100%; padding: 18px; border-radius: 4px; border: none;
            background: var(--accent); color: #000; font-weight: 700;
            font-size: 16px; cursor: pointer; margin-top: 20px; transition: opacity 0.2s;
        }
        .action-btn:active { opacity: 0.8; }

        /* Navigation Bar (Back / Next) */
        .nav-bar { display: flex; gap: 10px; margin-top: 20px; }
        .nav-btn { flex: 1; padding: 15px; border-radius: 4px; font-size: 15px; cursor: pointer; font-weight: 600; border: none; }
        .btn-prev { background: var(--card); color: var(--text-main); border: 1px solid var(--border); }
        .btn-next { background: var(--accent); color: #000; }

        /* Result Styles */
        .result-card { background: var(--card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; text-align: left; }
        .result-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .type-code { font-size: 56px; font-weight: 800; color: var(--accent); margin-bottom: 10px; letter-spacing: 2px; }
        .type-title { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .type-subtitle { font-size: 16px; color: var(--text-sub); }
        
        .result-data-box { background: #1a1a1a; padding: 20px; border-radius: 4px; margin-bottom: 20px; }
        .result-data-row { margin-bottom: 15px; }
        .result-data-row:last-child { margin-bottom: 0; }
        .data-label { font-size: 12px; color: var(--text-sub); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .data-value { font-size: 15px; color: #fff; line-height: 1.5; }

        .tie-notice { margin: 20px 0; padding: 15px; background: #1a1a1a; border-radius: 4px; font-size: 13px; color: #888; border-left: 2px solid #444; line-height: 1.6; }
        .env-badge { display: inline-block; padding: 6px 14px; background: #222; font-size: 13px; border-radius: 4px; margin-right: 8px; margin-bottom: 8px; }
        .section-title { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; border-left: 2px solid var(--accent); padding-left: 10px; }
        
        .guide-box { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .guide-box ul { padding-left: 20px; margin: 0; color: #aaa; font-size: 13px; line-height: 1.6; }
        .guide-box li { margin-bottom: 8px; }

        .workflow-item { margin-bottom: 20px; padding: 15px; background: #1a1a1a; border-radius: 4px; }
        .workflow-step { font-weight: 700; font-size: 14px; color: var(--accent); display: block; margin-bottom: 8px; }
        .workflow-prompt { font-family: monospace; font-size: 13px; color: #aaa; border-top: 1px solid #333; padding-top: 8px; display: block; margin-top: 8px; }
        .caution-box { padding: 15px; border-radius: 4px; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; font-size: 14px; margin-top: 20px; }
        .tip-box { padding: 15px; border-radius: 4px; background: rgba(255, 255, 255, 0.1); border: 1px solid #fff; color: #fff; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>

// ================= 앱 로직 상태 (스크린 단위 네비게이션) =================
let user = { name: "", studio: "", spec: "", years: "" };
let answers = new Array(42).fill(null); // 사용자의 응답 저장 배열
let screens = [];
let currentScreenIdx = 0;
let totalQs = 42;

// 앱 시작 시 전체 스크린(흐름) 배열 생성
function initApp() {
    screens.push({ type: 'intro' });
    screens.push({ type: 'user_info' });
    
    let globalQ = 0;
    sections.forEach((sec, sIdx) => {
        screens.push({ type: 'sec_intro', secData: sec });
        sec.questions.forEach((q, qIdx) => {
            screens.push({ type: 'question', secData: sec, qData: q, globalQ: globalQ++ });
        });
    });
    
    screens.push({ type: 'result_1' });
    renderScreen();
}

// 화면 렌더링

    const app = document.getElementById("app");
    const progressBox = document.getElementById("progress-box");
    const screen = screens[currentScreenIdx];

    // 스크린 전환 애니메이션 효과
    app.style.opacity = 0;
    
    setTimeout(() => {
        if (screen.type === 'intro') {
            progressBox.style.display = "none";
            app.innerHTML = `
                <h1>ATI × KIA</h1>
                <p class="desc-text">자동차 디자이너를 위한 집중력 유형 검사<br>당신의 뇌가 디자인 현장에서 집중하는 방식을 확인하고,<br>최적의 AI 협업 가이드를 받아보세요.</p>
                <div class="desc-text" style="font-size:13px; border-top:1px solid #222; padding-top:20px;">
                    이 검사는 자동차 디자이너로서 당신의 뇌가 어떤 방식으로 집중하는지 파악하기 위한 자기 이해 도구입니다. 집중력의 좋고 나쁨을 측정하지 않습니다. 모든 유형은 자동차 디자인 현장에서 고유한 가치를 가집니다.
                    <br><br>
                    <strong>총 42문항 · 약 10~15분 소요 · 정답 없음 — 가장 솔직하게 응답하세요</strong>
                </div>
                <button class="action-btn" onclick="goNext()">검사 시작하기</button>
            `;
        } 
        else if (screen.type === 'user_info') {
            progressBox.style.display = "none";
            app.innerHTML = `
                <div class="section-title">Step 0. 응답자 정보</div>
                <div class="form-group">
                    <label>이름 (필수)</label>
                    <input type="text" id="u-name" class="form-input" placeholder="성함을 입력하세요" value="${user.name}">
                </div>
                <div class="form-group">
                    <label>소속 / 스튜디오</label>
                    <input type="text" id="u-studio" class="form-input" placeholder="소속을 입력하세요 (공란 가능)" value="${user.studio}">
                </div>
                <div class="form-group">
                    <label>전문 분야</label>
                    <select id="u-spec" class="form-select">
                        <option value="Exterior" ${user.spec==='Exterior'?'selected':''}>익스테리어 (Exterior)</option>
                        <option value="Interior" ${user.spec==='Interior'?'selected':''}>인테리어 (Interior)</option>
                        <option value="CMF" ${user.spec==='CMF'?'selected':''}>색상·소재 (CMF)</option>
                        <option value="Concept" ${user.spec==='Concept'?'selected':''}>콘셉트 (Concept)</option>
                        <option value="Other" ${user.spec==='Other'?'selected':''}>기타 (Other)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>경력 연수</label>
                    <input type="number" id="u-years" class="form-input" placeholder="연차 숫자만 입력" value="${user.years}">
                </div>
                <div class="nav-bar">
                    <button class="nav-btn btn-prev" onclick="goPrev()">⬅ 뒤로</button>
                    <button class="nav-btn btn-next" onclick="saveUserInfoAndNext()">정보 저장 후 시작</button>
                </div>
            `;
        }
        else if (screen.type === 'sec_intro') {
            progressBox.style.display = "none";
            app.innerHTML = `
                <div class="section-title">SECTION 시작</div>
                <h1>${screen.secData.title}</h1>
                <p class="desc-text" style="color:white; font-size:18px; margin-bottom:10px;">${screen.secData.sub}</p>
                <p class="desc-text">${screen.secData.desc}</p>
                <div class="nav-bar">
                    <button class="nav-btn btn-prev" onclick="goPrev()">⬅ 뒤로</button>
                    <button class="nav-btn btn-next" onclick="goNext()">${screen.secData.btn} ➡</button>
                </div>
            `;
        }
        else if (screen.type === 'question') {
            progressBox.style.display = "block";
            document.getElementById("progress-txt").innerText = `Question ${screen.globalQ + 1} / ${totalQs}`;
            document.getElementById("bar").style.width = `${((screen.globalQ) / totalQs) * 100}%`;

            let ans = answers[screen.globalQ];
            
            app.innerHTML = `
                <div class="section-title">${screen.secData.title}</div>
                <h2>${screen.qData[0]}</h2>
                <div class="btn-group">
                    <button class="score-btn ${ans === 5 ? 'selected' : ''}" onclick="selectAnswer(5)">매우 그렇다 <span>5</span></button>
                    <button class="score-btn ${ans === 4 ? 'selected' : ''}" onclick="selectAnswer(4)">그렇다 <span>4</span></button>
                    <button class="score-btn ${ans === 3 ? 'selected' : ''}" onclick="selectAnswer(3)">보통 <span>3</span></button>
                    <button class="score-btn ${ans === 2 ? 'selected' : ''}" onclick="selectAnswer(2)">아니다 <span>2</span></button>
                    <button class="score-btn ${ans === 1 ? 'selected' : ''}" onclick="selectAnswer(1)">전혀 아니다 <span>1</span></button>
                </div>
                <div class="nav-bar">
                    <button class="nav-btn btn-prev" onclick="goPrev()">⬅ 뒤로</button>
                    <button class="nav-btn btn-next" onclick="goNext()">다음 ➡</button>
                </div>
            `;
        }
        else if (screen.type === 'result_1') {
            renderResult1();
        }
        else if (screen.type === 'result_2') {
            renderResult2();
        }
        app.style.opacity = 1;
    }, 150);
}

// 네비게이션 함수들
function goPrev() {
    if (currentScreenIdx > 0) { currentScreenIdx--; renderScreen(); }
}

function goNext() {
    let screen = screens[currentScreenIdx];
    if (screen.type === 'question') {
        if (answers[screen.globalQ] === null) { alert("항목을 선택해 주세요."); return; }
    }
    if (currentScreenIdx < screens.length - 1) { currentScreenIdx++; renderScreen(); }
}

function saveUserInfoAndNext() {
    user.name = document.getElementById("u-name").value;
    user.studio = document.getElementById("u-studio").value;
    user.spec = document.getElementById("u-spec").value;
    user.years = document.getElementById("u-years").value;
    if(!user.name) { alert("이름을 입력해 주세요."); return; }
    goNext();
}

function selectAnswer(val) {
    let screen = screens[currentScreenIdx];
    answers[screen.globalQ] = val;
    goNext(); 
}

// ================= 결과 계산 및 렌더링 =================
let finalCode = "";
let calculatedScores = {};

function calculateResults() {
    calculatedScores = { G:0, S:0, L:0, R:0, F:0, C:0, M:0, U:0, EF:0, PF:0 };
    ties = [];
    
    let gQ = 0;
    sections.forEach(sec => {
        sec.questions.forEach(q => {
            let val = answers[gQ];
            if(val !== null) {
                let type = q[1];
                if (type === "PF_REV") calculatedScores["PF"] += (6 - val);
                else calculatedScores[type] += val;
            }
            gQ++;
        });
    });

    const checkTie = (a, b) => {
        if (calculatedScores[a] === calculatedScores[b]) { ties.push(`${a}/${b}`); return a; }
        return calculatedScores[a] > calculatedScores[b] ? a : b;
    }
    
    finalCode = checkTie("G", "S") + checkTie("L", "R") + checkTie("F", "C") + checkTie("M", "U");
}

function renderResult1() {
    document.getElementById("progress-box").style.display = "none";
    calculateResults();
    
    const myInfo = interpretationTable.find(i => i.code === finalCode);
    const efAvg = (calculatedScores.EF / 3).toFixed(1);
    const pfAvg = (calculatedScores.PF / 7).toFixed(1);

    document.getElementById("app").innerHTML = `
        <div class="result-card">
            <div class="result-header">
                <div class="section-title">${user.name} 님의 검사 결과</div>
                <div class="type-code">${finalCode}</div>
                <div class="type-title">${myInfo.type}</div>
                <div class="type-subtitle">${myInfo.sub}</div>
            </div>
            
            <p style="color:#aaa; font-size:13px; margin-bottom:20px;">
                유형 코드는 고정된 정체성이 아니라, 지금 나의 집중 방식을 보여주는 좌표입니다. 어떤 유형도 더 우월하지 않으며, 프로젝트·팀·상황에 따라 각각 빛나는 순간이 다릅니다.
            </p>

            <div class="result-data-box">
                <div class="result-data-row">
                    <span class="data-label">핵심 강점</span>
                    <span class="data-value">${myInfo.strength}</span>
                </div>
                <div class="result-data-row">
                    <span class="data-label">적합 역할</span>
                    <span class="data-value" style="color:#00ffcc;">${myInfo.role}</span>
                </div>
            </div>

            ${ties.length > 0 ? `<div class="tie-notice">💡 당신은 <strong>${ties.join(", ")}</strong> 영역에서 두 성향이 혼재된 형태입니다.</div>` : ''}

            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <div class="env-badge" style="flex:1; text-align:center;">물리적 자유도<br><strong style="font-size:16px; color:#fff;">${efAvg}</strong> / 5.0</div>
                <div class="env-badge" style="flex:1; text-align:center;">심리적 자유도<br><strong style="font-size:16px; color:#fff;">${pfAvg}</strong> / 5.0</div>
            </div>

            <div class="guide-box">
                <div class="section-title" style="margin-bottom:15px;">검사 결과 활용 안내</div>
                <ul>
                    <li>유형 코드는 4자리 알파벳(예: GLCM, SRFU)으로 구성됩니다. 각 자리는 순서대로 집중 대상(G/S), 집중 시간(L/R), 집중 패턴(F/C), 집중 동기(M/U)를 나타냅니다.</li>
                    <li>환경 지수(EF·PF)가 낮게 나왔다면, 당신의 집중 유형이 현재 환경에서 충분히 발현되지 못하고 있을 수 있습니다. 유형 코드와 함께 해석하세요.</li>
                    <li>같은 유형이라도 프로젝트 성격과 팀 구성에 따라 다른 전략이 필요합니다. 이 검사는 출발점입니다.</li>
                    <li>팀 내 여러 유형이 공존할 때 최적의 시너지가 납니다. 동료들과 함께 검사하고 유형 분포를 비교해 보세요.</li>
                </ul>
            </div>

            <button class="action-btn" onclick="showResult2()">상세 AI 활용 가이드 보기 ➡</button>
            <button class="nav-btn btn-prev" style="width:100%; margin-top:10px;" onclick="goPrev()">⬅ 답변 수정하러 가기</button>
        </div>
    `;
}

function showResult2() {
    screens.push({ type: 'result_2' });
    currentScreenIdx++;
    renderScreen();
}

function renderResult2() {
    const myInfo = interpretationTable.find(i => i.code === finalCode);
    const myGuide = aiGuides[finalCode];

    document.getElementById("app").innerHTML = `
        <div class="result-card">
            <div class="section-title">${finalCode} 전용 AI 협력 가이드</div>
            <h2 style="margin-bottom:5px;">${myInfo.type}</h2>
            
            <p style="color:#00ffcc; font-size:14px; margin-bottom:20px; line-height:1.5;">
                <strong>집중 특성:</strong> ${myGuide.focus}
            </p>
            
            <div class="result-data-box" style="margin-bottom:25px; white-space:pre-line; color:#ccc; font-size:14px;">
                <strong>역할 분담</strong>
                ${myGuide.role}
            </div>
            
            <div class="section-title">실전 워크플로우</div>
            ${myGuide.workflow.map(w => `
                <div class="workflow-item">
                    <span class="workflow-step">${w.step}: ${w.act}</span>
                    <span class="workflow-prompt">" ${w.prompt} "</span>
                </div>
            `).join('')}

            <div class="caution-box">
                <strong>주의 (⚠)</strong><br>${myGuide.caution}
            </div>

            <div class="tip-box">
                ${myGuide.tip}
            </div>

            <div class="nav-bar">
                <button class="nav-btn btn-prev" onclick="goPrev()">⬅ 이전 결과 보기</button>
                <button class="nav-btn btn-next" onclick="location.reload()">처음부터 다시</button>
            </div>
        </div>
    `;
}

// 앱 실행
initApp();
</script>
</body>
</html>
