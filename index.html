<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATI - Kia Car Designer Edition</title>
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --accent: #ffffff;
            --text-main: #ffffff;
            --text-sub: #888888;
            --border: #222222;
        }
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }
        .container { width: 90%; max-width: 600px; padding: 40px 20px; }
        
        /* Progress Bar */
        .progress-container { margin-bottom: 40px; }
        .progress-text { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .progress-bg { height: 2px; background: var(--border); width: 100%; position: relative; }
        .progress-bar { height: 2px; background: var(--accent); width: 0%; transition: width 0.4s ease; }

        /* Card Animation */
        #app { transition: opacity 0.3s ease, transform 0.3s ease; }
        .fade-out { opacity: 0; transform: translateY(-10px); }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.5px; }
        h2 { font-size: 20px; font-weight: 500; line-height: 1.5; margin-bottom: 30px; word-break: keep-all; }
        p { color: var(--text-sub); line-height: 1.7; font-size: 15px; margin-bottom: 30px; }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .score-btn { 
            padding: 18px; border-radius: 4px; border: 1px solid var(--border); 
            background: var(--card); color: var(--text-main); font-size: 16px;
            cursor: pointer; transition: all 0.2s ease; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }
        .score-btn:hover { background: #1a1a1a; border-color: #444; }
        .score-btn span { font-size: 12px; color: var(--text-sub); }

        .action-btn {
            width: 100%; padding: 18px; border-radius: 4px; border: none;
            background: var(--accent); color: #000; font-weight: 700;
            font-size: 16px; cursor: pointer; margin-top: 20px;
        }

        /* Result Styles */
        .result-card { background: var(--card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); }
        .type-code { font-size: 48px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
        .type-title { font-size: 22px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .env-badge { display: inline-block; padding: 4px 12px; background: #222; font-size: 12px; border-radius: 20px; margin-right: 8px; }
        .section-title { font-size: 14px; color: var(--text-sub); margin: 25px 0 10px; text-transform: uppercase; }
        .workflow-item { margin-bottom: 15px; padding-left: 15px; border-left: 1px solid #333; }
        .workflow-step { font-weight: 700; font-size: 14px; display: block; margin-bottom: 4px; }
        .workflow-prompt { font-family: monospace; font-size: 13px; color: #aaa; background: #1a1a1a; padding: 8px; display: block; margin-top: 6px; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-container" id="progress-box" style="display:none;">
        <div class="progress-text" id="progress-txt">Question 1 / 42</div>
        <div class="progress-bg"><div class="progress-bar" id="bar"></div></div>
    </div>
    <div id="app">
        <h1>ATI × KIA</h1>
        <p>자동차 디자이너를 위한 집중력 유형 검사<br>당신의 뇌가 디자인 현장에서 집중하는 방식을 확인하세요.</p>
        <button class="action-btn" onclick="startSurvey()">검사 시작하기</button>
    </div>
</div>

<script>
// ================= 데이터 정의 (Q33-42 환경지수 추가) =================
const sections = [
    { title: "1축 — 집중 대상", desc: "무엇에 집중하는가 — 폭넓게 연결하는가, 깊이 파고드는가", questions: [
        ["디자인 스케치를 하다가 소재·엔지니어링·마케팅 등 관련 분야로 사고가 확장된다.","G"],
        ["자동차 외에도 항공기·가전·패션 등 다른 분야의 디자인 트렌드를 지속적으로 참고한다.","G"],
        ["한 프로젝트에서 스타일링·UX·브랜딩·소재 등 여러 역할을 동시에 다루는 것이 편하다.","G"],
        ["디자인 콘셉트를 발전시킬 때 인접 분야(문화·사회·기술)의 아이디어를 연결한다.","G"],
        ["차체 면 처리(서피스·라인 워크) 같은 특정 전문 영역을 깊이 파고드는 것이 가장 즐겁다.","S"],
        ["관심 없는 디자인 분야(예: 인테리어 전문인데 익스테리어)는 세부 파악이 어렵다.","S"],
        ["내가 집중하는 특정 스타일 또는 디자인 철학이 명확하게 있다.","S"],
        ["넓은 분야를 두루 아는 것보다 한 영역에서 타의 추종을 불허하는 완성도를 원한다.","S"]
    ]},
    { title: "2축 — 집중 시간", desc: "얼마나 오래 집중하는가 — 길고 깊게, 짧고 빠르게", questions: [
        ["한 스케치 또는 3D 모델링을 시작하면 완성될 때까지 다른 작업으로 넘어가기 싫다.","L"],
        ["디자인 세부(프로포션·갭·반사광 등)를 다듬는 단계에서 몇 시간이 순식간에 지나간다.","L"],
        ["장기 프로젝트에서 초기 열정을 마지막 양산 단계까지 유지하는 편이다.","L"],
        ["중간에 방해를 받으면 다시 이전의 집중 흐름으로 돌아오는 데 상당한 시간이 걸린다.","L"],
        ["아이디어 스케치 단계에서 하나에 머물기보다 여러 방향을 빠르게 시도하며 비교한다.","R"],
        ["짧고 집중적인 디자인 스프린트에서 최고의 성과를 낸다.","R"],
        ["같은 작업을 오래 하면 쉽게 지루해지고 새로운 접근이나 다른 프로젝트로 에너지가 끌린다.","R"],
        ["여러 프로젝트를 동시에 진행할 때 오히려 아이디어가 더 잘 나온다.","R"]
    ]},
    { title: "3축 — 집중 패턴", desc: "어떻게 처리하는가 — 데이터에서 출발, 스토리에서 출발", questions: [
        ["디자인 검토 시 치수·갭·단차 수치를 먼저 확인하고 판단하는 편이다.","F"],
        ["레퍼런스 이미지를 볼 때 세부 디테일(스티칭·텍스처·조인트)을 먼저 분석한다.","F"],
        ["경쟁차 벤치마킹 시 스펙 데이터와 구체적 수치가 확보되어야 결론을 내릴 수 있다.","F"],
        ["디자인 수정 지시를 받을 때 변경 이유보다 정확히 무엇을 바꾸는지가 더 중요하다.","F"],
        ["차를 처음 볼 때 세부보다 전체 실루엣과 분위기를 먼저 파악한다.","C"],
        ["디자인 브리핑을 받을 때 브랜드 철학·타깃 감성의 맥락을 먼저 이해해야 한다.","C"],
        ["서로 다른 스타일 간의 공통 패턴이나 감성적 연결고리를 잘 찾아낸다.","C"],
        ["디자인 발표 시 세부 설명보다 콘셉트 스토리와 감성적 흐름을 먼저 전달한다.","C"]
    ]},
    { title: "4축 — 집중 동기", desc: "무엇을 위해 집중하는가 — 내면의 만족, 팀과 사용자를 위해", questions: [
        ["아무도 알아주지 않아도 내가 만족할 때까지 디자인을 다듬는다.","M"],
        ["외부 평가보다 스스로 '이 디자인은 옳다'는 확신이 있을 때 집중력이 올라간다.","M"],
        ["관심 없는 세그먼트 프로젝트는 아무리 중요해도 집중하기 어렵다.","M"],
        ["외부 요구 없이 순수하게 개인적으로 디자인하는 시간이 가장 몰입된다.","M"],
        ["팀 전체 방향이 명확하고 공유될 때 디자인에 더 집중된다.","U"],
        ["이 차가 실제로 사용자의 삶을 바꾼다는 감각이 있을 때 더 열심히 하게 된다.","U"],
        ["팀원·클라이언트의 기대에 부응하기 위해 스스로를 채찍질하는 경우가 많다.","U"],
        ["브랜드 비전이나 사회적 의미와 연결될 때 집중력이 폭발한다.","U"]
    ]},
    { title: "환경 지수", desc: "디자이너로서 현재 환경이 나의 집중 유형 발현에 얼마나 자유로운가", questions: [
        ["원하는 작업(스타일링·모델링 등)에 집중할 수 있는 업무 환경이 갖춰져 있다.","EF"],
        ["재료·소프트웨어 등 원하는 도구를 사용할 수 있는 경제적 여건이 된다.","EF"],
        ["성장 과정에서 다양한 디자인 경험을 자유롭게 시도해 볼 수 있었다.","EF"],
        ["디자인 작업 중 실수를 해도 조직 내에서 비난보다 격려를 더 많이 받는다.","PF"],
        ["현재 프로젝트 방향이나 자신의 디자인 역할을 스스로 어느 정도 선택할 수 있다.","PF"],
        ["팀의 기대와 다른 디자인을 제안할 때 죄책감보다 자신감이 든다.","PF"],
        ["지금 집중하는 작업이 타인의 시선보다 나의 진정한 관심에서 비롯되었다고 느낀다.","PF"],
        ["내 집중력이나 창의력이 '부족하다'는 죄책감을 자주 느낀다. (역문항)","PF_REV"],
        ["현재 내 집중 방식과 작업 환경이 나의 디자인 성향에 잘 맞는다고 느낀다.","PF"],
        ["나의 집중력 패턴과 디자인 강점을 스스로 잘 이해하고 있다.","PF"]
    ]}
];

// ================= 결과 데이터 (AI 가이드 포함) =================
const fullResultData = {
    "GLFM": {
        title: "박학 장인형", 
        desc: "다양한 분야를 공부하면서도 세부 팩트까지 꼼꼼히 확인합니다.",
        role: "선임 스타일리스트, 풀패키지 디자이너, 제품 총괄",
        aiRole: "AI = 광범위한 리서치 엔진 / 디자이너 = 최종 완성도 판정자",
        workflow: [
            {step: "리서치", content: "경쟁차 스펙·소재 트렌드 1차 수집", prompt: "2024년 출시 프리미엄 SUV 익스테리어 트렌드 요약해줘"},
            {step: "검증", content: "AI 초안의 수치·출처 교차확인", prompt: "위 내용 중 특정 수치의 원출처를 확인해줘"}
        ],
        caution: "AI 출력물을 완벽한 팩트로 오인하는 것. 반드시 2차 검증이 필요합니다.",
        tip: "클레이 리뷰 전 기준치를 AI로 조사하되, 양산 사양은 사내 DB와 대조하세요."
    },
    // ... 나머지 15개 유형도 위와 같은 구조로 데이터베이스화 가능 (지면상 생략, 로직은 동일)
    // 예시용 기본 데이터
    "default": { title: "기아 디자이너", desc: "분석 중인 유형입니다.", role: "자동차 디자이너", aiRole: "협력 파트너", workflow: [], caution: "데이터 확인 필요", tip: "팀과 공유하세요" }
};

let currentQ = 0;
let totalQs = sections.reduce((acc, s) => acc + s.questions.length, 0);
let scores = { G:0, S:0, L:0, R:0, F:0, C:0, M:0, U:0, EF:0, PF:0 };

function startSurvey() {
    document.getElementById("progress-box").style.display = "block";
    renderQuestion();
}

function renderQuestion() {
    const app = document.getElementById("app");
    app.classList.add("fade-out");
    
    setTimeout(() => {
        let qCount = 0;
        let targetQ, targetSec;
        
        for (let s of sections) {
            if (currentQ < qCount + s.questions.length) {
                targetQ = s.questions[currentQ - qCount];
                targetSec = s;
                break;
            }
            qCount += s.questions.length;
        }

        if (currentQ >= totalQs) { showResult(); return; }

        app.innerHTML = `
            <div class="section-title">${targetSec.title}</div>
            <h2>${targetQ[0]}</h2>
            <div class="btn-group">
                <button class="score-btn" onclick="next(5)">매우 그렇다 <span>5</span></button>
                <button class="score-btn" onclick="next(4)">그렇다 <span>4</span></button>
                <button class="score-btn" onclick="next(3)">보통 <span>3</span></button>
                <button class="score-btn" onclick="next(2)">아니다 <span>2</span></button>
                <button class="score-btn" onclick="next(1)">전혀 아니다 <span>1</span></button>
            </div>
        `;
        
        document.getElementById("progress-txt").innerText = `Question ${currentQ + 1} / ${totalQs}`;
        document.getElementById("bar").style.width = `${(currentQ / totalQs) * 100}%`;
        app.classList.remove("fade-out");
    }, 300);
}

function next(val) {
    let qCount = 0;
    let targetType;
    for (let s of sections) {
        if (currentQ < qCount + s.questions.length) {
            targetType = s.questions[currentQ - qCount][1];
            break;
        }
        qCount += s.questions.length;
    }

    // 역문항 처리 (Q40)
    if (targetType === "PF_REV") {
        scores["PF"] += (6 - val);
    } else {
        scores[targetType] += val;
    }

    currentQ++;
    renderQuestion();
}

function showResult() {
    document.getElementById("progress-box").style.display = "none";
    
    let code = "";
    code += scores.G >= scores.S ? "G" : "S";
    code += scores.L >= scores.R ? "L" : "R";
    code += scores.F >= scores.C ? "F" : "C";
    code += scores.M >= scores.U ? "M" : "U";

    // 환경지수 평균 계산
    let efAvg = (scores.EF / 3).toFixed(1);
    let pfAvg = (scores.PF / 7).toFixed(1);

    const data = fullResultData[code] || fullResultData["GLFM"]; // 예시용

    document.getElementById("app").innerHTML = `
        <div class="result-card">
            <div class="type-code">${code}</div>
            <div class="type-title">${data.title}</div>
            <p>${data.desc}</p>
            <div class="section-title">추천 역할</div>
            <div style="font-size:15px; margin-bottom:20px;">${data.role}</div>
            
            <div class="env-badge">직업 자유도 ${efAvg}</div>
            <div class="env-badge">심리적 자유도 ${pfAvg}</div>

            <button class="action-btn" onclick="showAiGuide('${code}')">AI 협력 가이드 보기</button>
        </div>
    `;
}

function showAiGuide(code) {
    const data = fullResultData[code] || fullResultData["GLFM"];
    document.getElementById("app").innerHTML = `
        <div class="result-card">
            <div class="section-title">AI 협력 가이드</div>
            <h2 style="margin-bottom:10px;">${data.aiRole}</h2>
            
            <div class="section-title">실전 워크플로</div>
            ${data.workflow.map(w => `
                <div class="workflow-item">
                    <span class="workflow-step">${w.step}: ${w.content}</span>
                    <span class="workflow-prompt">${w.prompt}</span>
                </div>
            `).join('')}

            <div class="section-title">주의사항</div>
            <p style="font-size:14px; color:#ef4444;">${data.caution}</p>

            <div class="section-title">현장 팁</div>
            <p style="font-size:14px;">${data.tip}</p>

            <button class="action-btn" style="background:#222; color:#fff;" onclick="location.reload()">다시 테스트하기</button>
        </div>
    `;
}
</script>
</body>
</html>
