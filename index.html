<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATI - Kia Car Designer Edition</title>
    <style>
        :root {
            --bg: #050505; --card: #121212; --accent: #ffffff;
            --text-main: #ffffff; --text-sub: #888888; --border: #222222;
            --input-bg: #1a1a1a;
        }
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { width: 90%; max-width: 600px; padding: 40px 20px; }
        
        /* Progress Bar */
        .progress-container { margin-bottom: 40px; }
        .progress-text { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .progress-bg { height: 2px; background: var(--border); width: 100%; }
        .progress-bar { height: 2px; background: var(--accent); width: 0%; transition: width 0.4s ease; }

        #app { transition: opacity 0.3s ease; min-height: 450px; }
        h1 { font-size: 26px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.5px; }
        h2 { font-size: 20px; font-weight: 500; line-height: 1.5; margin-bottom: 30px; word-break: keep-all; }
        p { color: var(--text-sub); line-height: 1.7; font-size: 15px; margin-bottom: 30px; white-space: pre-line; }

        /* Form Styles */
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 8px; text-transform: uppercase; }
        .form-input { 
            width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid var(--border);
            color: white; border-radius: 4px; box-sizing: border-box; font-size: 16px;
        }
        .form-select {
            width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid var(--border);
            color: white; border-radius: 4px; font-size: 16px; appearance: none;
        }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .score-btn { 
            padding: 18px; border-radius: 4px; border: 1px solid var(--border); 
            background: var(--card); color: var(--text-main); font-size: 16px;
            cursor: pointer; transition: all 0.2s ease; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }
        .score-btn:hover { background: #1a1a1a; border-color: #444; }
        .score-btn span { font-size: 12px; color: var(--text-sub); }

        .action-btn {
            width: 100%; padding: 18px; border-radius: 4px; border: none;
            background: var(--accent); color: #000; font-weight: 700;
            font-size: 16px; cursor: pointer; margin-top: 20px;
        }

        /* Result & Tie Alert */
        .result-card { background: var(--card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); }
        .type-code { font-size: 48px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
        .tie-notice { 
            margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 4px;
            font-size: 14px; border-left: 3px solid #444; color: #aaa; line-height: 1.6;
        }
        .section-title { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; border-left: 2px solid var(--accent); padding-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-container" id="progress-box" style="display:none;">
        <div class="progress-text" id="progress-txt">준비 단계</div>
        <div class="progress-bg"><div class="progress-bar" id="bar"></div></div>
    </div>
    <div id="app">
        <h1>ATI × KIA</h1>
        <p>자동차 디자이너를 위한 집중력 유형 검사<br>본격적인 시작에 앞서 응답자 정보를 입력해 주세요.</p>
        <button class="action-btn" onclick="renderUserInfoForm()">정보 입력하기</button>
    </div>
</div>

<script>
// ================= 데이터 정의 =================
const sections = [
    { title: "1축 — 집중 대상", desc: "폭넓게 연결하는 '다방면파(G)' vs 깊이 파고드는 '한우물파(S)'", questions: [
        ["디자인 스케치를 하다가 소재·엔지니어링·마케팅 등 관련 분야로 사고가 확장된다.","G"],
        ["자동차 외에도 항공기·가전·패션 등 다른 분야의 디자인 트렌드를 지속적으로 참고한다.","G"],
        ["한 프로젝트에서 스타일링·UX·브랜딩·소재 등 여러 역할을 동시에 다루는 것이 편하다.","G"],
        ["디자인 콘셉트를 발전시킬 때 인접 분야(문화·사회·기술)의 아이디어를 연결한다.","G"],
        ["차체 면 처리(서피스·라인 워크) 같은 특정 전문 영역을 깊이 파고드는 것이 가장 즐겁다.","S"],
        ["관심 없는 디자인 분야는 세부 파악이 어렵다.","S"],
        ["내가 집중하는 특정 스타일 또는 디자인 철학이 명확하게 있다.","S"],
        ["넓은 분야를 두루 아는 것보다 한 영역에서 완성도를 높이는 것을 선호한다.","S"]
    ]},
    { title: "2축 — 집중 시간", desc: "길고 깊게 유지하는 '사자파(L)' vs 짧고 빠르게 전환하는 '토끼파(R)'", questions: [
        ["한 스케치 또는 3D 모델링을 시작하면 완성될 때까지 몰입한다.","L"],
        ["디자인 세부를 다듬는 단계에서 몇 시간이 순식간에 지나간다.","L"],
        ["장기 프로젝트에서 초기 열정을 마지막까지 유지하는 편이다.","L"],
        ["중간에 방해를 받으면 다시 흐름으로 돌아오는 데 시간이 걸린다.","L"],
        ["아이디어 스케치 시 여러 방향을 빠르게 시도하며 비교한다.","R"],
        ["짧고 집중적인 디자인 스프린트에서 최고의 성과를 낸다.","R"],
        ["같은 작업을 오래 하면 지루해지고 새로운 에너지가 필요하다.","R"],
        ["여러 프로젝트를 동시에 진행할 때 아이디어가 더 잘 나온다.","R"]
    ]},
    { title: "3축 — 집중 패턴", desc: "데이터 위주의 '팩트파(F)' vs 전체 스토리의 '맥락파(C)'", questions: [
        ["디자인 검토 시 치수나 수치를 먼저 확인한다.","F"],
        ["레퍼런스 이미지를 볼 때 세부 디테일을 분석한다.","F"],
        ["경쟁차 벤치마킹 시 스펙 데이터가 확보되어야 결론을 내린다.","F"],
        ["수정 지시 시 변경 이유보다 정확히 무엇을 바꾸는지가 중요하다.","F"],
        ["차를 처음 볼 때 전체 실루엣과 분위기를 파악한다.","C"],
        ["디자인 브리핑 시 브랜드 철학을 먼저 이해해야 한다.","C"],
        ["서로 다른 스타일 간의 감성적 연결고리를 잘 찾는다.","C"],
        ["디자인 발표 시 세부 설명보다 콘셉트 스토리를 강조한다.","C"]
    ]},
    { title: "4축 — 집중 동기", desc: "내면 만족의 '소의파(M)' vs 팀과 가치의 '대의파(U)'", questions: [
        ["내가 만족할 때까지 디자인을 다듬는다.","M"],
        ["스스로 '옳다'는 확신이 있을 때 집중력이 올라간다.","M"],
        ["관심 없는 세그먼트 프로젝트는 집중하기 어렵다.","M"],
        ["외부 요구 없이 순수하게 개인 작업할 때 가장 몰입된다.","M"],
        ["팀 전체 방향이 명확할 때 더 집중된다.","U"],
        ["이 차가 사용자의 삶을 바꾼다는 감각이 있을 때 열정적이다.","U"],
        ["팀원이나 클라이언트의 기대에 부응하려 노력한다.","U"],
        ["브랜드 비전과 연결될 때 집중력이 폭발한다.","U"]
    ]},
    { title: "환경 지수", desc: "현재 당신의 업무 환경과 심리적 자유도를 측정합니다.", questions: [
        ["원하는 작업에 집중할 수 있는 업무 환경이 갖춰져 있다.","EF"],
        ["경제적/물리적 여건이 작업에 충분하다.","EF"],
        ["다양한 디자인 경험을 자유롭게 시도해 볼 수 있었다.","EF"],
        ["실수를 해도 조직 내에서 격려를 더 많이 받는다.","PF"],
        ["자신의 디자인 역할을 스스로 어느 정도 선택할 수 있다.","PF"],
        ["팀의 기대와 다른 디자인 제안 시 자신감이 든다.","PF"],
        ["나의 진정한 관심에서 작업이 비롯되었다고 느낀다.","PF"],
        ["내 집중력이 부족하다는 죄책감을 자주 느낀다. (역문항)","PF_REV"],
        ["현재 환경이 나의 디자인 성향에 잘 맞는다고 느낀다.","PF"],
        ["나의 집중력 패턴을 스스로 잘 이해하고 있다.","PF"]
    ]}
];

const resultData = {
    GLFM: ["박학 장인형", "다양한 분야를 아우르며 세부 디테일까지 정확하게 완성하는 디자이너"],
    GLFU: ["체계적 수호자형", "브랜드 일관성을 유지하며 장기 프로젝트를 완벽히 이끄는 디자이너"],
    GLCM: ["통찰 탐험가형", "깊은 사색을 통해 독창적 콘셉트와 미래 비전을 제시하는 디자이너"],
    GLCU: ["비전 설계자형", "다양한 인사이트를 통합해 조직의 방향을 제시하는 리더"],
    GRFM: ["민첩한 분석가형", "시장 트렌드를 빠르게 분석해 세련된 감각으로 풀어내는 디자이너"],
    GRFU: ["현장 해결사형", "위기 상황에서 빠른 실행력으로 문제를 푸는 디자이너"],
    GRCM: ["네트워크 기획자형", "이질적인 분야를 연결해 혁신적인 콘셉트를 만드는 디자이너"],
    GRCU: ["촉매형 리더", "빠른 상황 판단과 조율 능력으로 조직을 움직이는 리더"],
    SLFM: ["장인 전문가형", "특정 분야에서 압도적 완성도를 만드는 디자이너"],
    SLFU: ["헌신형 전문가", "깊은 전문성으로 팀의 기반을 지탱하는 신뢰받는 전문가"],
    SLCM: ["독자적 창조자형", "자신만의 미학적 철학을 구축해가는 예술가형 디자이너"],
    SLCU: ["사상적 리더형", "깊은 통찰과 철학을 바탕으로 미래 가치를 전파하는 리더"],
    SRFM: ["기민한 탐색자형", "하나의 영역을 깊이 알면서도 변화를 빠르게 포착하는 탐구자"],
    SRFU: ["기민한 실행자형", "전문성을 바탕으로 시안을 빠르게 구체화하는 실행가"],
    SRCM: ["창업가형 디자이너", "끊임없이 새로운 실험을 반복하는 창의적 실험가"],
    SRCU: ["변혁적 리더형", "전문성을 무기로 조직의 변화를 주도하는 리더"]
};

// ================= 앱 로직 =================
let user = { name: "", studio: "", spec: "", years: "" };
let currentSecIdx = -1;
let currentQIdx = 0;
let scores = { G:0, S:0, L:0, R:0, F:0, C:0, M:0, U:0, EF:0, PF:0 };
let ties = []; // 동점인 축을 저장

function renderUserInfoForm() {
    document.getElementById("progress-box").style.display = "block";
    const app = document.getElementById("app");
    app.innerHTML = `
        <div class="section-title">Step 0. 응답자 정보</div>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="u-name" class="form-input" placeholder="성함을 입력하세요">
        </div>
        <div class="form-group">
            <label>소속 / 스튜디오</label>
            <input type="text" id="u-studio" class="form-input" placeholder="예: 익스테리어 1팀">
        </div>
        <div class="form-group">
            <label>전문 분야</label>
            <select id="u-spec" class="form-select">
                <option value="Exterior">익스테리어 (Exterior)</option>
                <option value="Interior">인테리어 (Interior)</option>
                <option value="CMF">색상·소재 (CMF)</option>
                <option value="Concept">콘셉트 (Concept)</option>
                <option value="Other">기타 (Other)</option>
            </select>
        </div>
        <div class="form-group">
            <label>경력 연수</label>
            <input type="number" id="u-years" class="form-input" placeholder="연수만 숫자로 입력">
        </div>
        <button class="action-btn" onclick="saveUserInfo()">검사 시작하기</button>
    `;
}

function saveUserInfo() {
    user.name = document.getElementById("u-name").value;
    user.studio = document.getElementById("u-studio").value;
    user.spec = document.getElementById("u-spec").value;
    user.years = document.getElementById("u-years").value;
    
    if(!user.name || !user.studio) { alert("기본 정보를 입력해주세요."); return; }
    nextSection();
}

function nextSection() {
    currentSecIdx++;
    currentQIdx = 0;
    if (currentSecIdx >= sections.length) { showResult(); return; }
    renderIntro();
}

function renderIntro() {
    const sec = sections[currentSecIdx];
    document.getElementById("app").innerHTML = `
        <div class="section-title">SECTION ${currentSecIdx + 1}</div>
        <h1>${sec.title}</h1>
        <p>${sec.desc}</p>
        <button class="action-btn" onclick="renderQuestion()">이해했습니다</button>
    `;
}

function renderQuestion() {
    const sec = sections[currentSecIdx];
    const q = sec.questions[currentQIdx];
    
    let completedQs = 0;
    for(let i=0; i<currentSecIdx; i++) completedQs += sections[i].questions.length;
    completedQs += currentQIdx;
    let totalQs = 42;
    
    document.getElementById("progress-txt").innerText = `Question ${completedQs + 1} / ${totalQs}`;
    document.getElementById("bar").style.width = `${(completedQs / totalQs) * 100}%`;

    document.getElementById("app").innerHTML = `
        <div class="section-title">${sec.title}</div>
        <h2>${q[0]}</h2>
        <div class="btn-group">
            <button class="score-btn" onclick="handleAnswer(5)">매우 그렇다 <span>5</span></button>
            <button class="score-btn" onclick="handleAnswer(4)">그렇다 <span>4</span></button>
            <button class="score-btn" onclick="handleAnswer(3)">보통 <span>3</span></button>
            <button class="score-btn" onclick="handleAnswer(2)">아니다 <span>2</span></button>
            <button class="score-btn" onclick="handleAnswer(1)">전혀 아니다 <span>1</span></button>
        </div>
    `;
}

function handleAnswer(val) {
    const type = sections[currentSecIdx].questions[currentQIdx][1];
    if (type === "PF_REV") scores["PF"] += (6 - val);
    else scores[type] += val;

    currentQIdx++;
    if (currentQIdx >= sections[currentSecIdx].questions.length) nextSection();
    else renderQuestion();
}

function showResult() {
    document.getElementById("progress-box").style.display = "none";
    
    // 동점 체크 및 코드 생성
    let code = "";
    const checkTie = (a, b) => {
        if (scores[a] === scores[b]) { ties.push(`${a}와 ${b}`); return a; }
        return scores[a] > scores[b] ? a : b;
    }

    code += checkTie("G", "S");
    code += checkTie("L", "R");
    code += checkTie("F", "C");
    code += checkTie("M", "U");

    const typeInfo = resultData[code];
    const efAvg = (scores.EF / 3).toFixed(1);
    const pfAvg = (scores.PF / 7).toFixed(1);

    let tieHtml = "";
    if(ties.length > 0) {
        tieHtml = `
            <div class="tie-notice">
                <strong>💡 균형 잡힌 복합 성향 감지</strong><br>
                당신은 현재 <strong>${ties.join(", ")}</strong> 영역에서 두 성향이 매우 균형 있게 나타납니다. 
                결과는 대표 유형인 ${code}로 표시되었으나, 상황에 따라 두 유형의 강점을 유연하게 사용하는 '하이브리드 디자이너'의 특성을 가지고 있습니다.
            </div>
        `;
    }

    document.getElementById("app").innerHTML = `
        <div class="result-card">
            <div class="section-title">${user.name} 님의 결과 (${user.spec})</div>
            <div class="type-code">${code}</div>
            <div class="type-title">${typeInfo[0]}</div>
            <p style="color:white; font-size:14px;">${typeInfo[1]}</p>
            
            ${tieHtml}

            <div class="section-title" style="margin-top:20px;">환경 지수</div>
            <div style="display:flex; gap:10px;">
                <div class="env-badge" style="background:#222; padding:10px; border-radius:4px; flex:1; font-size:12px;">물리적 자유: ${efAvg}</div>
                <div class="env-badge" style="background:#222; padding:10px; border-radius:4px; flex:1; font-size:12px;">심리적 자유: ${pfAvg}</div>
            </div>
            <button class="action-btn" onclick="location.reload()">다시 테스트하기</button>
        </div>
    `;
}
</script>
</body>
</html>
