<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATI 테스트</title>

<style>
body {
    background: #0a0a0a;
    color: white;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container { width: 90%; max-width: 600px; text-align: center; }
button {
    margin: 5px;
    padding: 12px;
    border-radius: 8px;
    background: #222;
    color: white;
    border: none;
}
.progress { height: 5px; background: #333; margin-bottom: 20px;}
.bar { height: 5px; background: #00ffcc; width: 0%;}
</style>

</head>

<body>

<div class="container">
<div class="progress"><div class="bar" id="bar"></div></div>
<h2 id="question"></h2>
<div id="answers"></div>
</div>

<script>

// 🔥 42문항 (샘플 일부만, 나머지는 복붙 가능)
const questions = [
{q:"다양한 분야를 연결해 생각한다", type:"G"},
{q:"여러 역할을 동시에 다룬다", type:"G"},
{q:"다른 분야 참고를 즐긴다", type:"G"},
{q:"아이디어 연결이 빠르다", type:"G"},

{q:"한 분야 깊이 파고든다", type:"S"},
{q:"특정 스타일 집착한다", type:"S"},
{q:"관심 분야 외 어려움", type:"S"},
{q:"완성도 집착", type:"S"},

// 👉 나머지 동일 패턴 추가하면 됨
];

let index = 0;
let scores = {G:0,S:0,L:0,R:0,F:0,C:0,M:0,U:0};

function render(){
    if(index >= questions.length){
        result();
        return;
    }
    document.getElementById("question").innerText = questions[index].q;

    let html="";
    for(let i=1;i<=5;i++){
        html += `<button onclick="answer(${i})">${i}</button>`;
    }
    document.getElementById("answers").innerHTML = html;
    document.getElementById("bar").style.width = ((index/questions.length)*100)+"%";
}

function answer(val){
    scores[questions[index].type] += val;
    index++;
    render();
}

function result(){
    let code="";
    code += scores.G > scores.S ? "G":"S";
    code += scores.L > scores.R ? "L":"R";
    code += scores.F > scores.C ? "F":"C";
    code += scores.M > scores.U ? "M":"U";

    document.querySelector(".container").innerHTML = `
    <h1>${code}</h1>
    <p>당신의 집중 유형입니다</p>
    <p>AI 협업 전략은 다음과 같습니다:</p>
    <p>👉 AI는 보조, 인간은 방향 설정</p>
    `;
}

render();

</script>

</body>
</html>
