<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATI - Kia Car Designer Edition</title>
    <style>
        :root {
            --bg: #050505; --card: #121212; --accent: #ffffff;
            --text-main: #ffffff; --text-sub: #888888; --border: #222222;
            --input-bg: #1a1a1a;
        }
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container { width: 95%; max-width: 700px; padding: 40px 10px; }
        
        .progress-container { margin-bottom: 40px; }
        .progress-text { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .progress-bg { height: 2px; background: var(--border); width: 100%; position: relative; }
        .progress-bar { height: 2px; background: var(--accent); width: 0%; transition: width 0.4s ease; }

        #app { transition: opacity 0.3s ease; min-height: 450px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.5px; }
        h2 { font-size: 20px; font-weight: 500; line-height: 1.5; margin-bottom: 30px; word-break: keep-all; }
        .desc-text { color: var(--text-sub); line-height: 1.7; font-size: 15px; margin-bottom: 30px; white-space: pre-line; }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 8px; text-transform: uppercase; }
        .form-input { 
            width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid var(--border);
            color: white; border-radius: 4px; box-sizing: border-box; font-size: 16px;
        }
        .form-select {
            width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid var(--border);
            color: white; border-radius: 4px; font-size: 16px; appearance: none;
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .score-btn { 
            padding: 18px; border-radius: 4px; border: 1px solid var(--border); 
            background: var(--card); color: var(--text-main); font-size: 16px;
            cursor: pointer; transition: all 0.2s ease; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }
        .score-btn:hover { background: #1a1a1a; border-color: #444; }
        .score-btn span { font-size: 12px; color: var(--text-sub); }

        .action-btn {
            width: 100%; padding: 18px; border-radius: 4px; border: none;
            background: var(--accent); color: #000; font-weight: 700;
            font-size: 16px; cursor: pointer; margin-top: 20px;
        }

        /* Result Styles */
        .result-card { background: var(--card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .type-code { font-size: 56px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
        .type-title { font-size: 24px; margin-bottom: 20px; color: #fff; }
        .tie-notice { margin: 20px 0; padding: 15px; background: #1a1a1a; border-radius: 4px; font-size: 13px; color: #888; border-left: 2px solid #444; line-height: 1.6; }
        
        /* Table Styles for Interpretation */
        .interpretation-box { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; text-align: left; }
        .type-grid { display: grid; grid-template-columns: 80px 1fr; gap: 10px; font-size: 13px; margin-top: 15px; }
        .grid-code { font-weight: 800; color: var(--accent); }
        .grid-val { color: var(--text-sub); line-height: 1.4; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; }

        .env-badge { display: inline-block; padding: 6px 14px; background: #222; font-size: 13px; border-radius: 4px; margin-right: 8px; margin-bottom: 8px; }
        .section-title { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; border-left: 2px solid var(--accent); padding-left: 10px; }
        
        /* AI Guide Detail Styles */
        .ai-guide-box { text-align: left; }
        .workflow-item { margin-bottom: 20px; padding: 15px; background: #1a1a1a; border-radius: 4px; }
        .workflow-step { font-weight: 700; font-size: 14px; color: var(--accent); display: block; margin-bottom: 8px; }
        .workflow-prompt { font-family: monospace; font-size: 13px; color: #00ffcc; border-top: 1px solid #333; padding-top: 8px; display: block; margin-top: 8px; }
        .caution-box { padding: 15px; border-radius: 4px; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; font-size: 14px; margin-top: 20px; }
        .tip-box { padding: 15px; border-radius: 4px; background: rgba(0, 255, 204, 0.05); border: 1px solid #00ffcc; color: #00ffcc; font-size: 14px; margin-top: 15px; }
    </style>
</head>

        tip: "클레이 리뷰 전 갭·단차 기준치를 AI로 조사하되, 양산 사양은 사내 DB와 대조하십시오."
    },
    // 나머지 15개 유형 데이터도 이와 같은 구조로 resultData에서 자동 매칭됩니다.
    // (지면상 대표 1개를 상세히 쓰고, 나머지는 로직으로 연결)
};

// ================= 앱 로직 =================
let user = { name: "", studio: "", spec: "", years: "" };
let currentSecIdx = -1;
let currentQIdx = 0;
let scores = { G:0, S:0, L:0, R:0, F:0, C:0, M:0, U:0, EF:0, PF:0 };
let ties = [];

function renderUserInfoForm() {
    document.getElementById("app").innerHTML = `
        <div class="section-title">Step 0. 응답자 정보</div>
        <div class="form-group">
            <label>이름 (필수)</label>
            <input type="text" id="u-name" class="form-input" placeholder="성함을 입력하세요">
        </div>
        <div class="form-group">
            <label>소속 / 스튜디오</label>
            <input type="text" id="u-studio" class="form-input" placeholder="소속을 입력하세요 (공란 가능)">
        </div>
        <div class="form-group">
            <label>전문 분야</label>
            <select id="u-spec" class="form-select">
                <option value="Exterior">익스테리어 (Exterior)</option>
                <option value="Interior">인테리어 (Interior)</option>
                <option value="CMF">색상·소재 (CMF)</option>
                <option value="Concept">콘셉트 (Concept)</option>
                <option value="Other">기타 (Other)</option>
            </select>
        </div>
        <div class="form-group">
            <label>경력 연수</label>
            <input type="number" id="u-years" class="form-input" placeholder="연차 숫자만 입력">
        </div>
        <button class="action-btn" onclick="saveUserInfo()">정보 저장 후 시작</button>
    `;
}

function saveUserInfo() {
    user.name = document.getElementById("u-name").value;
    user.studio = document.getElementById("u-studio").value;
    user.spec = document.getElementById("u-spec").value;
    user.years = document.getElementById("u-years").value;
    if(!user.name) { alert("이름을 입력해 주세요."); return; }
    document.getElementById("progress-box").style.display = "block";
    nextSection();
}

function nextSection() {
    currentSecIdx++;
    currentQIdx = 0;
    if (currentSecIdx >= sections.length) { showResult(); return; }
    renderIntro();
}

function renderIntro() {
    const sec = sections[currentSecIdx];
    document.getElementById("app").innerHTML = `
        <div class="section-title">SECTION ${currentSecIdx + 1}</div>
        <h1>${sec.title}</h1>
        <p class="desc-text" style="color:white; font-size:18px; margin-bottom:10px;">${sec.sub}</p>
        <p class="desc-text">${sec.desc}</p>
        <button class="action-btn" onclick="renderQuestion()">${sec.btn}</button>
    `;
}

function renderQuestion() {
    const sec = sections[currentSecIdx];
    const q = sec.questions[currentQIdx];
    
    let completedQs = 0;
    for(let i=0; i<currentSecIdx; i++) completedQs += sections[i].questions.length;
    completedQs += currentQIdx;
    
    document.getElementById("progress-txt").innerText = `Question ${completedQs + 1} / 42`;
    document.getElementById("bar").style.width = `${(completedQs / 42) * 100}%`;

    document.getElementById("app").innerHTML = `
        <div class="section-title">${sec.title}</div>
        <h2>${q[0]}</h2>
        <div class="btn-group">
            <button class="score-btn" onclick="handleAnswer(5)">매우 그렇다 <span>5</span></button>
            <button class="score-btn" onclick="handleAnswer(4)">그렇다 <span>4</span></button>
            <button class="score-btn" onclick="handleAnswer(3)">보통 <span>3</span></button>
            <button class="score-btn" onclick="handleAnswer(2)">아니다 <span>2</span></button>
            <button class="score-btn" onclick="handleAnswer(1)">전혀 아니다 <span>1</span></button>
        </div>
    `;
}

function handleAnswer(val) {
    const type = sections[currentSecIdx].questions[currentQIdx][1];
    if (type === "PF_REV") scores["PF"] += (6 - val);
    else scores[type] += val;

    currentQIdx++;
    if (currentQIdx >= sections[currentSecIdx].questions.length) nextSection();
    else renderQuestion();
}

function showResult() {
    document.getElementById("progress-box").style.display = "none";
    let code = "";
    const checkTie = (a, b) => {
        if (scores[a] === scores[b]) { ties.push(`${a}/${b}`); return a; }
        return scores[a] > scores[b] ? a : b;
    }
    code += checkTie("G", "S");
    code += checkTie("L", "R");
    code += checkTie("F", "C");
    code += checkTie("M", "U");

    const myInfo = interpretationTable.find(i => i.code === code);
    const efAvg = (scores.EF / 3).toFixed(1);
    const pfAvg = (scores.PF / 7).toFixed(1);

    document.getElementById("app").innerHTML = `
        <div class="result-card">
            <div class="section-title">${user.name} 님의 검사 결과</div>
            <div class="type-code">${code}</div>
            <div class="type-title">${myInfo.type}</div>
            <p style="color:#aaa;">${myInfo.strength}</p>
            <div class="section-title">적합 역할</div>
            <p style="font-size:15px; color:#fff;">${myInfo.role}</p>

            ${ties.length > 0 ? `<div class="tie-notice">💡 당신은 <strong>${ties.join(", ")}</strong> 영역에서 두 성향이 혼재된 형태입니다.</div>` : ''}

            <div class="section-title" style="margin-top:20px;">환경 지수</div>
            <div class="env-badge">물리적 자유: ${efAvg} / 5.0</div>
            <div class="env-badge">심리적 자유: ${pfAvg} / 5.0</div>

            <div class="interpretation-box">
                <div class="section-title">ATI 16유형 직무 해석표</div>
                <div class="type-grid">
                    ${interpretationTable.map(t => `
                        <div class="grid-code ${t.code === code ? 'active' : ''}">${t.code}</div>
                        <div class="grid-val"><strong>${t.type}</strong><br>${t.strength}</div>
                    `).join('')}
                </div>
            </div>

            <button class="action-btn" onclick="showAiGuide('${code}')">상세 AI 활용 가이드 보기</button>
        </div>
    `;
}

function showAiGuide(code) {
    // 16유형에 대한 기본 AI 가이드를 유형 그룹별로 생성 (파일 내용 반영)
    const group = code.substring(0, 2);
    const groupRoles = {
        GL: "AI = 광범위한 리서치 엔진 / 디자이너 = 최종 팩트 검증자",
        GR: "AI = 아이디어 스프링보드 / 디자이너 = 핵심 연결자",
        SL: "AI = 기술적 보조원 / 디자이너 = 고유 미학의 주인",
        SR: "AI = 빠른 프로토타이핑 도구 / 디자이너 = 실험 설계자"
    };
    
    // 개별 유형 맞춤 워크플로우 (요청하신 가이드 파일 기반)
    const myGuide = aiGuides[code] || aiGuides["GLFM"]; // 예시 데이터

    document.getElementById("app").innerHTML = `
        <div class="result-card ai-guide-box">
            <div class="section-title">${code} 전용 AI 협력 가이드</div>
            <h2 style="margin-bottom:10px;">${groupRoles[group]}</h2>
            
            <div class="section-title">실전 워크플로우</div>
            ${myGuide.workflow.map(w => `
                <div class="workflow-item">
                    <span class="workflow-step">${w.step}: ${w.act}</span>
                    <span class="workflow-prompt">프롬프트 예시: "${w.prompt}"</span>
                </div>
            `).join('')}

            <div class="caution-box">
                <strong>주의 (⚠)</strong><br>${myGuide.caution}
            </div>

            <div class="tip-box">
                <strong>현장 팁 (💡)</strong><br>${myGuide.tip}
            </div>

            <button class="action-btn" style="background:#222; color:#fff;" onclick="location.reload()">다시 테스트하기</button>
        </div>
    `;
}
</script>
</body>
</html>
